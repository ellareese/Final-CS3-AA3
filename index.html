<!DOCTYPE html>
<html>
<head>
    <title>Pre-Order Form</title>
    <style>
    body {
      font-family:'Times New Roman', Times, serif;
      background-color: rgb(248, 200, 233);
    }

    .container {
      width: 500px;
      margin: auto;
      background: rgb(240, 153, 195);
      padding: 20px;
      border-radius: 10px;
      margin-top: 50px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 95%;
      padding: 8px;
      margin: 8px 0;
    }

    #terms {
      width: 10%;
    }

    button {
      padding: 10px;
      width: 100%;
      margin-top: 5px;
      background-color: #d159af;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #a0457a;
    }

    .error {
      color: red;
      margin-bottom: 10px;
      min-height: 18px;
    }
    </style>
</head>

<body>

<div class="container">
    <h2>OINK! Pre-Order</h2>

    <!-- Error Message Area -->
    <div id="errorMsg" class="error"></div>

    <form onsubmit="return handleOrder()">
    
    <label>Name:</label>
    <input type="text" id="name">

    <label>Product:</label>
    <select id="variant">
        <option value="">Select</option>
        <option value="267">Pink (Php 267.00)</option>
        <option value="399">Green Limited Edition (Php 399.00)</option>
    </select>

    <label>Quantity:</label>
    <input type="number" id="quantity">

    <label>Pickup Method:</label>
    <select id="pickup">
        <option value="">Select</option>
        <option value="Delivery">Delivery</option>
        <option value="Meetup">Meetup</option>
    </select>

    <label>Address (for delivery only):</label>
    <input type="text" id="address">

    <label>
        <input type="checkbox" id="terms"> I accept terms
    </label>
    <br><br>

    <button type="button" onclick="loadPreviousOrder()">Load Previous Order</button>
    <button type="submit">Submit</button>

    </form>
</div>

<script>

    // COOKIE FUNCTIONS
    function setCookie(name, value, maxAge) {
        document.cookie = name + "=" + value + ";max-age=" + maxAge;
    }

    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split("; ");
        for (let i = 0; i < ca.length; i++) {
            let c = ca[i];

            if (c.charAt(0) == " ") {
                return c.substring(1);
            }

            if (c.indexOf(nameEQ) == 0) {
                return c.substring(nameEQ.length);
            }
        }
        return "";
    }

    function deleteCookie(name) {
        document.cookie = name + "=;max-age=0";
    }

    // MAIN SUBMIT HANDLER
    function handleOrder() {
        document.getElementById("errorMsg").innerHTML = "";

        // TODO: Get values
        let nameC = document.getElementById("name").value;
        let product = document.getElementById("variant").value;
        let quantity = document.getElementById("quantity").value;
        let method = document.getElementById("pickup").value;
        let address = document.getElementById("address").value;
        let terms = document.getElementById("terms").checked;

        // TODO: Validation
    function validateForm(name, variant, quantity, pickup, address, terms) {

        let errors = [];
        if (nameC  == "" || product == "" || quantity == "" || method == "") {
            errors.push("All fields must not be empty.");
        }

        if (quantity <= 0) {
            errors.push("Quantity must be greater than 0.");
        }

        if (method == "Delivery" && address == "") {
            errors.push("Address is required for delivery.");
        }

        if (!terms) {
            errors.push("You must accept the terms.");
        }

        // Otherwise: Store data (cookies + localStorage)
        if (errors.length > 0) {
            document.getElementById("errorMsg").innerHTML = errors.join("<br>");
            return false;
        }
    }
        setCookie("customerName", nameC, 86400); // 1 day in seconds

        // Store data in localStorage
        localStorage.setItem("name", nameC);
        localStorage.setItem("variant", product);
        localStorage.setItem("quantity", quantity);
        localStorage.setItem("pickup", method);
        localStorage.setItem("address", address);

        // Redirect to summary.html
        window.location.href = "summary.html";

        return false;
    }

    // LOAD PREVIOUS ORDER
    function loadPreviousOrder() {

        // TODO: Retrieve stored data
        let name = getCookie("customerName");
        let product = localStorage.getItem("variant");
        let quantity = localStorage.getItem("quantity");
        let method = localStorage.getItem("pickup");
        let address = localStorage.getItem("address");

        // TODO: If no data: Display error message "No previous order data"
        if (!name && !product) {
            document.getElementById("errorMsg").innerHTML = "No previous order data.";
            return;
        }

        // TODO: Otherwise: Populate fields
        document.getElementById("name").value = name;
        document.getElementById("variant").value = product;
        document.getElementById("quantity").value = quantity;
        document.getElementById("pickup").value = method;
        document.getElementById("address").value = address;
    }

</script>

</body>
</html>
